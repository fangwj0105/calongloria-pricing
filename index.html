<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calon Gloria 印尼产品价格</title>
    <script>
        (function redirectRecoveryLink() {
            let marker = `${window.location.search}${window.location.hash}`;
            let isRecovery = marker.includes('type=recovery') || marker.includes('access_token=') || marker.includes('error_code=');
            if (isRecovery) window.location.replace(`/reset-password.html${window.location.search}${window.location.hash}`);
        })();
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f7; color: #1d1d1f; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { margin: 0 0 18px; color: #0055b3; font-size: 1.35em; text-align: center; }
        .login-fields { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
        label { font-weight: 700; font-size: 0.88em; color: #555; }
        input { width: 140px; padding: 8px; border: 1px solid #d2d2d7; border-radius: 6px; text-align: right; font-size: 0.95em; }
        button { padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-size: 0.88em; }
        button { background: #0055b3; color: white; }
        button:hover { background: #00449e; }
        [hidden] { display: none !important; }
        .access-box { margin-bottom: 18px; padding: 14px; background: #fff8f0; border: 1px solid #f2d6ad; border-radius: 8px; }
        .access-box input { text-align: left; }
        .session-bar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; color: #555; font-size: 0.88em; }
        .session-bar button { background: #eef7ff; color: #0055b3; border: 1px solid #cfe4ff; }
        .status { margin-bottom: 12px; color: #666; font-size: 0.86em; }
        .market-price-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .table-responsive { overflow-x: auto; }
        .market-price-table { width: 100%; border-collapse: collapse; background: white; font-size: 0.9em; }
        .market-price-table th { background: #eef7ff; color: #1d1d1f; padding: 10px 8px; border: 1px solid #d8e4f2; text-align: center; }
        .market-price-table td { padding: 9px 8px; border: 1px solid #e5e5ea; text-align: right; white-space: nowrap; }
        .market-price-table td:first-child { text-align: left; font-weight: 700; }
        .dealer-col { background: #f7fff5; color: #1f6f35; }
        .empty { padding: 24px; background: #fff8f0; border: 1px solid #f2d6ad; border-radius: 8px; color: #7a4a00; }
    </style>
</head>
<body>
<div class="container">
    <h1>Calon Gloria 印尼产品价格</h1>
    <div id="access-box" class="access-box" hidden>
        <strong>价格页需要授权账号登录访问</strong>
        <div class="login-fields">
            <input type="email" id="front-email" placeholder="邮箱">
            <input type="password" id="front-password" placeholder="密码">
            <button onclick="loginFrontend()">登录</button>
        </div>
    </div>
    <div id="session-bar" class="session-bar" hidden>
        <span id="session-label"></span>
        <button onclick="logoutFrontend()">退出登录</button>
    </div>
    <div id="status" class="status"></div>
    <div id="price-output"></div>
</div>

<script src="supabase-config.js?v=20260705-access1"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
    let supabaseClient = null;
    const PUBLIC_PRICE_ROWS = [];
    let models = [];
    let marketSettings = { rate: 2650, ppnRate: 11 };

    function setStatus(message) {
        document.getElementById('status').textContent = message || '';
    }

    function getSupabaseClient() {
        let config = window.CALON_SUPABASE || {};
        if (!config.url || !config.anonKey || !window.supabase) return null;
        if (!supabaseClient) {
            supabaseClient = window.supabase.createClient(config.url, config.anonKey);
        }
        return supabaseClient;
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function formatRmb(value) {
        return `¥${Number(value || 0).toLocaleString(undefined, {maximumFractionDigits:0})}`;
    }

    function formatIdr(value) {
        return `Rp ${Number(value || 0).toLocaleString(undefined, {maximumFractionDigits:0})}`;
    }

    function clonePublicRows() {
        return PUBLIC_PRICE_ROWS.map(row => ({...row}));
    }

    async function getRemoteAccessMode(client) {
        if (!client) return window.CALON_SUPABASE?.requireFrontendLogin ? 'private' : 'public';
        let { data } = await client
            .from('app_settings')
            .select('value')
            .eq('key', 'frontend_access')
            .maybeSingle();
        return data?.value?.mode || (window.CALON_SUPABASE?.requireFrontendLogin ? 'private' : 'public');
    }

    async function ensureFrontendAccess(client) {
        let accessMode = await getRemoteAccessMode(client);
        let accessBox = document.getElementById('access-box');
        let sessionBar = document.getElementById('session-bar');
        let sessionLabel = document.getElementById('session-label');
        if (accessMode !== 'private') {
            accessBox.hidden = true;
            sessionBar.hidden = true;
            return true;
        }
        let { data } = await client.auth.getSession();
        let session = data?.session;
        if (!session) {
            accessBox.hidden = false;
            sessionBar.hidden = true;
            setStatus('请使用后台账号管理中已启用的邮箱登录。');
            return false;
        }
        let { data: profile, error } = await client
            .from('app_profiles')
            .select('role, is_active, email')
            .eq('user_id', session.user.id)
            .maybeSingle();
        if (error) throw error;
        let allowed = !!profile?.is_active && ['owner', 'viewer'].includes(profile.role);
        accessBox.hidden = allowed;
        sessionBar.hidden = false;
        sessionLabel.textContent = `${session.user.email || profile?.email || '当前账号'} / ${allowed ? profile.role : '未授权'}`;
        if (!allowed) setStatus('当前账号未在后台账号权限中启用，不能查看前端价格。');
        return allowed;
    }

    async function loadRemoteModels(client) {
        if (!client) return [];
        let { data, error } = await client
            .from('published_prices')
            .select('name, retail_rmb, dealer_rmb, sort_order')
            .order('sort_order', { ascending: true });
        if (error) throw error;
        return (data || []).map(row => ({
            name: row.name,
            retailRmb: Number(row.retail_rmb || 0),
            dealerRmb: Number(row.dealer_rmb || 0)
        }));
    }

    async function loadMarketSettings(client) {
        if (!client) return;
        let { data, error } = await client
            .from('app_settings')
            .select('value')
            .eq('key', 'market_settings')
            .maybeSingle();
        if (error) throw error;
        let value = data?.value || {};
        marketSettings = {
            rate: Number(value.rate) || 2650,
            ppnRate: Number(value.ppnRate) || 11
        };
    }

    async function loadModels() {
        let client = getSupabaseClient();
        if (client) {
            try {
                let allowed = await ensureFrontendAccess(client);
                if (!allowed) {
                    models = [];
                    setStatus('请登录后查看价格表。');
                    return;
                }
                await loadMarketSettings(client);
                let remoteRows = await loadRemoteModels(client);
                if (remoteRows.length) {
                    models = remoteRows;
                    setStatus('已读取远程发布价格。');
                    return;
                }
            } catch (error) {
                models = [];
                setStatus(`远程价格读取失败，请确认账号权限和网络状态。${error.message || ''}`);
                return;
            }
        }
        models = clonePublicRows();
        if (!client) setStatus('尚未配置远程登录服务，无法显示价格。');
    }

    function recalcModels() {
        models.forEach(m => {
            m.ourPrice = parseFloat(m.retailRmb) || 0;
            m.dealerPrice = parseFloat(m.dealerRmb) || 0;
        });
    }

    function buildMarketPriceTableHtml(rate, ppnRate, forPrint = false) {
        if (!models.length) {
            return '<div class="empty">暂无价格数据。</div>';
        }
        let title = `各机型印尼市场价格表 (含${ppnRate.toFixed(0)}%增值税 PPN)`;
        let rowsHtml = models.map(m => {
            let taxRate = ppnRate / 100;
            let retailRmbTax = m.ourPrice * (1 + taxRate);
            let retailIdrTax = retailRmbTax * rate;
            let dealerRmbTax = m.dealerPrice * (1 + taxRate);
            let dealerIdrTax = dealerRmbTax * rate;
            return `<tr>
                <td>${escapeHtml(m.name)}</td>
                <td>${formatRmb(retailRmbTax)}</td>
                <td>${formatIdr(retailIdrTax)}</td>
                <td class="dealer-col">${formatRmb(dealerRmbTax)}</td>
                <td class="dealer-col">${formatIdr(dealerIdrTax)}</td>
            </tr>`;
        }).join('');

        return `
            <div class="market-price-header">
                <strong>${title}</strong>
            </div>
            <div class="table-responsive">
                <table class="market-price-table">
                    <thead>
                        <tr>
                            <th>型号规格</th>
                            <th>零售税后价 RMB</th>
                            <th>零售税后价 IDR</th>
                            <th>代理商税后价 RMB</th>
                            <th>代理商税后价 IDR</th>
                        </tr>
                    </thead>
                    <tbody>${rowsHtml}</tbody>
                </table>
            </div>`;
    }

    function renderPrices() {
        recalcModels();
        document.getElementById('price-output').innerHTML = buildMarketPriceTableHtml(marketSettings.rate, marketSettings.ppnRate);
    }

    async function renderPage() {
        await loadModels();
        renderPrices();
    }

    async function loginFrontend() {
        let client = getSupabaseClient();
        if (!client) {
            alert('尚未配置远程登录服务。');
            return;
        }
        let email = document.getElementById('front-email').value.trim();
        let password = document.getElementById('front-password').value;
        let { error } = await client.auth.signInWithPassword({ email, password });
        if (error) {
            alert(error.message);
            return;
        }
        renderPage();
    }

    async function logoutFrontend() {
        let client = getSupabaseClient();
        if (client) await client.auth.signOut();
        models = [];
        renderPage();
    }

    renderPage();
</script>
</body>
</html>
