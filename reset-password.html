<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Kata Sandi Calon Gloria / Calon Gloria 重置密码</title>
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f5f5f7; color: #1d1d1f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .panel { width: min(440px, calc(100vw - 32px)); background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.06); box-sizing: border-box; }
        h1 { margin: 0 0 18px; color: #0055b3; font-size: 1.35em; text-align: center; }
        .zh { display: block; margin-top: 2px; color: #6e6e73; font-size: 0.86em; font-weight: 500; }
        label { display: block; margin: 12px 0 5px; color: #555; font-weight: 700; font-size: 0.88em; }
        input { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #d2d2d7; border-radius: 6px; font-size: 0.95em; }
        button { width: 100%; margin-top: 16px; padding: 10px 14px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; background: #0055b3; color: #fff; }
        button:disabled { opacity: 0.55; cursor: not-allowed; }
        a { color: #0055b3; font-weight: 700; text-decoration: none; }
        .status { min-height: 22px; margin-top: 12px; color: #666; font-size: 0.92em; line-height: 1.5; }
        .error { color: #d64045; font-weight: 700; }
        .success { color: #1f6f35; font-weight: 700; }
        .hidden { display: none; }
    </style>
</head>
<body>
<main class="panel">
    <h1>Reset Kata Sandi Admin<span class="zh">重置后台密码</span></h1>
    <div id="form-area">
        <label for="password">Kata Sandi Baru<span class="zh">新密码</span></label>
        <input id="password" type="password" autocomplete="new-password" minlength="8">
        <label for="confirm-password">Konfirmasi Kata Sandi Baru<span class="zh">确认新密码</span></label>
        <input id="confirm-password" type="password" autocomplete="new-password" minlength="8">
        <button id="submit-button" onclick="updatePassword()" disabled>Perbarui Kata Sandi<span class="zh">更新密码</span></button>
    </div>
    <div id="done-area" class="hidden">
        <a href="/admin.html">Kembali ke Login Admin<span class="zh">返回后台登录</span></a>
    </div>
    <div id="status" class="status">Membaca tautan reset...<span class="zh">正在读取重置链接...</span></div>
</main>

<script src="supabase-config.js?v=20260705-reset1"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
    let client = null;
    let hasRecoverySession = false;

    function setStatus(message, kind = '') {
        let el = document.getElementById('status');
        el.className = `status ${kind}`;
        el.innerHTML = message || '';
    }

    function getClient() {
        let cfg = window.CALON_SUPABASE || {};
        if (!cfg.url || !cfg.anonKey || !window.supabase) return null;
        if (!client) client = window.supabase.createClient(cfg.url, cfg.anonKey);
        return client;
    }

    function enableForm(session) {
        hasRecoverySession = !!session;
        document.getElementById('submit-button').disabled = !hasRecoverySession;
        if (hasRecoverySession) setStatus('Masukkan kata sandi baru.<span class="zh">请输入新密码。</span>');
    }

    async function initResetPage() {
        let sb = getClient();
        if (!sb) {
            setStatus('Supabase belum dikonfigurasi. Kata sandi tidak dapat direset.<span class="zh">尚未配置 Supabase，无法重置密码。</span>', 'error');
            return;
        }
        sb.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY' || session) enableForm(session);
        });
        for (let attempt = 0; attempt < 10; attempt += 1) {
            let { data } = await sb.auth.getSession();
            if (data?.session) {
                enableForm(data.session);
                return;
            }
            await new Promise(resolve => setTimeout(resolve, 300));
        }
        setStatus('Tautan reset tidak valid atau sudah kedaluwarsa. Kembali ke login admin dan kirim ulang email reset.<span class="zh">重置链接无效或已过期，请回到后台登录页重新发送密码重置邮件。</span>', 'error');
    }

    async function updatePassword() {
        let sb = getClient();
        let password = document.getElementById('password').value;
        let confirmPassword = document.getElementById('confirm-password').value;
        if (!hasRecoverySession) {
            setStatus('Buka halaman ini dari tautan reset terbaru di email.<span class="zh">请使用最新的邮件重置链接打开本页面。</span>', 'error');
            return;
        }
        if (password.length < 8) {
            setStatus('Kata sandi baru minimal 8 karakter.<span class="zh">新密码至少需要 8 位。</span>', 'error');
            return;
        }
        if (password !== confirmPassword) {
            setStatus('Konfirmasi kata sandi tidak sama.<span class="zh">两次输入的密码不一致。</span>', 'error');
            return;
        }
        document.getElementById('submit-button').disabled = true;
        let { error } = await sb.auth.updateUser({ password });
        if (error) {
            document.getElementById('submit-button').disabled = false;
            setStatus(error.message, 'error');
            return;
        }
        await sb.auth.signOut();
        document.getElementById('form-area').classList.add('hidden');
        document.getElementById('done-area').classList.remove('hidden');
        setStatus('Kata sandi sudah diperbarui. Kembali ke admin untuk masuk lagi.<span class="zh">密码已更新，请返回后台重新登录。</span>', 'success');
    }

    initResetPage();
</script>
</body>
</html>
